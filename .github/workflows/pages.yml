name: Deploy Site para GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Dá permissão para o GitHub ler o código e subir para o Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5
        
      - name: Configurar o Pages
        uses: actions/configure-pages@v5
        
      - name: Fazer o Upload dos Arquivos do Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
