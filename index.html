<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação Série D 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Emerald 500 */
            --primary-dark: #059669; /* Emerald 600 */
            --bg-main: #0f172a; /* Slate 900 */
            --card-bg: rgba(30, 41, 59, 0.65); /* Slate 800 com transparência */
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --row-hover: rgba(255, 255, 255, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            /* Fundo escuro com dois "focos de luz" sutis para dar profundidade */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.08), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1050px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.02) inset;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .header-top h1 {
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(16, 185, 129, 0.2);
        }

        .filter-container {
            position: relative;
        }

        .filter-container select {
            appearance: none;
            padding: 12px 40px 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .filter-container select:hover, .filter-container select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        /* Ícone de seta customizado no select */
        .filter-container::after {
            content: "▼";
            font-size: 0.7rem;
            color: var(--primary);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .actions-container {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-simular {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-simular:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px rgba(16, 185, 129, 0.3);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-dark) rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.4);
        }

        .table-responsive::-webkit-scrollbar {
            height: 6px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background-color: var(--primary-dark);
            border-radius: 10px;
        }
        .table-responsive::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            min-width: 850px;
        }

        th, td {
            padding: 18px 16px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            background: rgba(15, 23, 42, 0.95);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .team-name {
            text-align: left;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.05rem;
        }

        /* Animação de entrada nas linhas da tabela */
        tbody tr {
            opacity: 0;
            animation: slideIn 0.4s ease-out forwards;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        tbody tr:hover {
            background: var(--row-hover);
            /* transform: scale(1.005); */
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        td strong {
            color: var(--primary);
            font-size: 1.15rem;
            font-weight: 800;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .shield {
            width: 32px;
            height: 32px;
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 50%;
            padding: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            vertical-align: middle;
            transition: transform 0.3s ease;
        }
        
        tbody tr:hover .shield {
            transform: scale(1.15) rotate(-5deg);
        }

        /* Status Badges e outras classes que não estavam sendo usadas podem ser mantidas se desejar, mas foram ocultadas nesta visualização */
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>Classificação - Série D</h1>
        <div class="actions-container">
            <a href="simulador.html" class="btn-simular">🎲 Simulador Mata-Mata</a>
            <div class="filter-container">
                <select id="fase-filter">
                    <option value="Todas">Todas as Fases</option>
                    <option value="1ª Fase">Somente Eliminados 1ª Fase</option>
                    <option value="2ª Fase">Chegaram na 2ª Fase</option>
                    <option value="3ª Fase">Chegaram na 3ª Fase</option>
                    <option value="Oitavas">Oitavas de Final</option>
                    <option value="Quartas">Quartas de Final</option>
                    <option value="Semifinal">Semifinal (Acesso)</option>
                    <option value="Final">Finalistas</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th class="team-name">Clube</th>
                    <th>PTS</th>
                    <th>J</th>
                    <th>V</th>
                    <th>E</th>
                    <th>D</th>
                    <th>GP</th>
                    <th>GC</th>
                    <th>SG</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <tr><td colspan="10" class="loading">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let globalData = [];

    function renderTable(filter) {
        const tbody = document.getElementById('tabela-corpo');
        tbody.innerHTML = '';
        
        let displayData = globalData;
        if (filter !== 'Todas') {
            const filterLevelMap = {
                '1ª Fase': 1,
                '2ª Fase': 2,
                '3ª Fase': 3,
                'Oitavas': 4,
                'Quartas': 5,
                'Semifinal': 6,
                'Final': 7
            };
            const requiredLevel = filterLevelMap[filter];
            
            if (filter === '1ª Fase') {
                // Mostra só quem ficou na 1ª fase
                displayData = globalData.filter(time => time.fase_nivel === 1);
            } else {
                // Para as outras fases, mostra quem chegou NELA (ou seja, fase_nivel >= requiredLevel)
                displayData = globalData.filter(time => time.fase_nivel >= requiredLevel);
            }
        }

        if (displayData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:20px; color:#94a3b8;">Nenhum time encontrado para este filtro.</td></tr>';
            return;
        }

        displayData.forEach((time, index) => {
            const tr = document.createElement('tr');
            tr.style.animationDelay = `${(index % 20) * 0.05}s`; // Limitamos o delay para não ficar lento com muitos times

            tr.innerHTML = `
                <td>${index + 1}º</td>
                <td class="team-name">
                    ${time.escudo_url ? `<img src="${time.escudo_url}" class="shield" alt="Escudo">` : ''}
                    <span>${time.time}</span>
                </td>
                <td><strong>${time.pontos}</strong></td>
                <td>${time.jogos}</td>
                <td>${time.vitorias}</td>
                <td>${time.empates}</td>
                <td>${time.derrotas}</td>
                <td>${time.gols_pro}</td>
                <td>${time.gols_contra}</td>
                <td>${time.saldo_gols}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Adiciona um timestamp na URL para evitar que o navegador faça cache do JSON antigo
    fetch('tabela_geral.json?v=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error('Arquivo não encontrado');
            return response.json();
        })
        .then(data => {
            globalData = data;
            renderTable('Todas');
        })
        .catch(error => {
            console.error('Erro ao carregar os dados:', error);
            document.getElementById('tabela-corpo').innerHTML = 
                '<tr><td colspan="10" style="color: #ef4444; padding: 20px;">Erro ao carregar a tabela. Gere o arquivo JSON primeiro.</td></tr>';
        });

    document.getElementById('fase-filter').addEventListener('change', (e) => {
        renderTable(e.target.value);
    });
</script>

</body>
</html>
