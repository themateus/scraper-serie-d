<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação Série D 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e676;
            --primary-dark: #00b259;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary);
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.3);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .table-responsive::-webkit-scrollbar {
            height: 8px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.95rem;
            min-width: 800px;
        }

        th, td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(0, 230, 118, 0.1);
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            position: sticky;
            top: 0;
        }

        th:first-child { border-top-left-radius: 8px; }
        th:last-child { border-top-right-radius: 8px; }

        .team-name {
            text-align: left;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        td strong {
            color: var(--primary);
            font-size: 1.1rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Tabela Colors - Removido os destaques de Campeão e Acesso */
        
        .shield {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        /* Cores baseadas nas Fases */
        .status-fase1 { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-fase2 { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-fase3 { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        .status-oitavas { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
        .status-quartas { background: rgba(236, 72, 153, 0.15); color: #ec4899; border: 1px solid rgba(236, 72, 153, 0.3); }
        .status-semifinal { background: rgba(0, 230, 118, 0.15); color: #00e676; border: 1px solid rgba(0, 230, 118, 0.3); }
        .status-final { background: rgba(212, 175, 55, 0.15); color: #d4af37; border: 1px solid rgba(212, 175, 55, 0.3); }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header-top h1 {
            margin-bottom: 0;
            font-size: 2rem;
            text-align: left;
        }

        .filter-container select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .filter-container select:focus {
            border-color: var(--primary);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>Classificação - Série D</h1>
        <div class="filter-container">
            <select id="fase-filter">
                <option value="Todas">Todas as Fases</option>
                <option value="1ª Fase">Somente Eliminados 1ª Fase</option>
                <option value="2ª Fase">Chegaram na 2ª Fase</option>
                <option value="3ª Fase">Chegaram na 3ª Fase</option>
                <option value="Oitavas">Oitavas de Final</option>
                <option value="Quartas">Quartas de Final</option>
                <option value="Semifinal">Semifinal (Acesso)</option>
                <option value="Final">Finalistas</option>
            </select>
        </div>
    </div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th class="team-name">Clube</th>
                    <th>PTS</th>
                    <th>J</th>
                    <th>V</th>
                    <th>E</th>
                    <th>D</th>
                    <th>GP</th>
                    <th>GC</th>
                    <th>SG</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <tr><td colspan="10" class="loading">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let globalData = [];

    function renderTable(filter) {
        const tbody = document.getElementById('tabela-corpo');
        tbody.innerHTML = '';
        
        let displayData = globalData;
        if (filter !== 'Todas') {
            const filterLevelMap = {
                '1ª Fase': 1,
                '2ª Fase': 2,
                '3ª Fase': 3,
                'Oitavas': 4,
                'Quartas': 5,
                'Semifinal': 6,
                'Final': 7
            };
            const requiredLevel = filterLevelMap[filter];
            
            if (filter === '1ª Fase') {
                // Mostra só quem ficou na 1ª fase
                displayData = globalData.filter(time => time.fase_nivel === 1);
            } else {
                // Para as outras fases, mostra quem chegou NELA (ou seja, fase_nivel >= requiredLevel)
                displayData = globalData.filter(time => time.fase_nivel >= requiredLevel);
            }
        }

        if (displayData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:20px; color:#94a3b8;">Nenhum time encontrado para este filtro.</td></tr>';
            return;
        }

        displayData.forEach((time, index) => {
            const tr = document.createElement('tr');
            tr.style.animationDelay = `${(index % 20) * 0.05}s`; // Limitamos o delay para não ficar lento com muitos times

            tr.innerHTML = `
                <td>${index + 1}º</td>
                <td class="team-name">
                    ${time.escudo_url ? `<img src="${time.escudo_url}" class="shield" alt="Escudo">` : ''}
                    <span>${time.time}</span>
                </td>
                <td><strong>${time.pontos}</strong></td>
                <td>${time.jogos}</td>
                <td>${time.vitorias}</td>
                <td>${time.empates}</td>
                <td>${time.derrotas}</td>
                <td>${time.gols_pro}</td>
                <td>${time.gols_contra}</td>
                <td>${time.saldo_gols}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Adiciona um timestamp na URL para evitar que o navegador faça cache do JSON antigo
    fetch('tabela_geral.json?v=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error('Arquivo não encontrado');
            return response.json();
        })
        .then(data => {
            globalData = data;
            renderTable('Todas');
        })
        .catch(error => {
            console.error('Erro ao carregar os dados:', error);
            document.getElementById('tabela-corpo').innerHTML = 
                '<tr><td colspan="10" style="color: #ef4444; padding: 20px;">Erro ao carregar a tabela. Gere o arquivo JSON primeiro.</td></tr>';
        });

    document.getElementById('fase-filter').addEventListener('change', (e) => {
        renderTable(e.target.value);
    });
</script>

</body>
</html>
