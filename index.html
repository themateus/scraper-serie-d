<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação Série D 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #00A032; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #00A032; color: white; }
        .team-name { text-align: left; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Classificação Geral - Série D 2026</h1>
    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th class="team-name">Clube</th>
                <th>PTS</th>
                <th>J</th>
                <th>V</th>
                <th>E</th>
                <th>D</th>
                <th>GP</th>
                <th>GC</th>
                <th>SG</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            <!-- Os dados serão injetados aqui via JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Busca o arquivo JSON gerado pelo seu script Python
    fetch('tabela_geral.json')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('tabela-corpo');
            data.forEach((time, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="team-name">${time.time}</td>
                    <td><strong>${time.pontos}</strong></td>
                    <td>${time.jogos}</td>
                    <td>${time.vitorias}</td>
                    <td>${time.empates}</td>
                    <td>${time.derrotas}</td>
                    <td>${time.gols_pro}</td>
                    <td>${time.gols_contra}</td>
                    <td>${time.saldo_gols}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(error => {
            console.error('Erro ao carregar os dados:', error);
            document.getElementById('tabela-corpo').innerHTML = '<tr><td colspan="10">Erro ao carregar a tabela. Gere o arquivo JSON primeiro.</td></tr>';
        });
</script>

</body>
</html>
